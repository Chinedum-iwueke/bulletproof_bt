hypothesis_id: "L1-H3"
title: "HAR-style Realised-Vol Forecast Improves Trend Gate and Stop Distance"
description: "L1-H3A applies L1-H1 EMA trend entries on 15m, replacing only ATR gate/stop with HAR RV_hat percentile gating and frozen close*sqrt(RV_hat) stop distance."
research_layer: "L1"
hypothesis_family: "trend_continuation"
version: "1.0.0"
author: "bulletproof_bt"
created_at: "2026-03-10T00:00:00Z"

required_indicators:
  - ema

indicator_defaults:
  ema_fast_period: 20
  ema_slow_period: 50
  rv1_formula: "(ln(close_t/close_t-1))^2"
  har_features:
    RV_d_days: 1
    RV_w_days: 7
    RV_m_days: 30
  har_forecast: "RV_hat = a + b*RV_d + c*RV_w + d*RV_m"
  bars_per_day_15m: 96

parameter_grid:
  signal_timeframe: ["15m", "1h"]
  fit_window_days: [180, 365]
  gate_quantile: [0.3, 0.7]
  k: [1.5, 2.0]
  T_hold: [24, 48]

gates:
  - field: "rvhat_pct_t"
    op: ">="
    param: "gate_quantile"
  - field: "trend_dir_t"
    op: "!="
    value: 0

entry:
  strategy: "l1_h3_har_rv_gate_trend"
  signal_timeframe: "15m"
  timeframe: "15m"
  base_execution_timeframe: "1m"
  order_timing: "bar_close_submit_next_bar_execution"
  disallow_flip: true
  no_pyramiding: true

exit:
  stop_kind: "close_sqrt_rvhat_multiple"
  stop_model: "fixed_close_sqrt_rvhat_multiple"
  stop_param: "k"
  stop_update_policy: "frozen_at_entry"
  time_stop_param: "T_hold"
  hold_time_unit: "signal_bars"
  exit_monitoring_timeframe: "1m"
  atr_source_timeframe: "none"
  take_profit:
    enabled: false

execution_semantics:
  signal_timeframe: "15m"
  base_execution_timeframe: "1m"
  base_data_frequency_expected: "1m"
  strategy_family: "trend_continuation"
  baseline_reference: "L1-H1"
  gate_model: "har_rv_percentile"
  stop_model: "fixed_close_sqrt_rvhat_multiple"
  stop_update_policy: "frozen_at_entry"
  tp_update_policy: "none"
  hold_time_unit: "signal_bars"
  exit_monitoring_timeframe: "1m"
  atr_source_timeframe: "none"
  coefficient_refit_cadence: "daily_on_completed_signal_day"
  fit_method: "deterministic_ols"
  fit_window_unit: "calendar_days"
  no_pyramiding: true

sizing:
  mode: "constant_r"
  formula: "qty = (equity * r_per_trade) / (k * close_t * sqrt(RV_hat_t))"

risk_controls:
  max_positions: 5
  enforce_max_leverage: true
  enforce_free_margin_constraints: true

evaluation:
  required_tiers: ["Tier2", "Tier3"]

logging:
  schema_version: "1.0"
  required_fields:
    - run_id
    - hypothesis_id
    - tier
    - ev_r_gross
    - ev_r_net
    - status
    - RV_hat_t
    - rvhat_pct_t
    - gate_pass
    - fit_ts_used
    - fit_window_days
    - trend_dir_t
    - stop_distance
    - risk_amount

notes:
  refit_discipline:
    - "Rolling window OLS fit on prior-only signal bars, refit once per completed signal day."
    - "No expanding-window variant in this baseline."
  falsification_criteria:
    - "If out-of-sample EV_r_net does not improve vs L1-H1 and sensitivity rises, reject L1-H3A baseline."
  failure_modes:
    - "Excess refit frequency can overfit; cadence is locked daily."
    - "Post-crash structural shifts can invalidate fixed-window coefficients."
