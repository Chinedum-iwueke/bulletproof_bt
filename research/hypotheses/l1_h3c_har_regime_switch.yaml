hypothesis_id: "L1-H3C"
title: "HAR-based volatility regime switch: L1-H1 vs L1-H2"
description: "L1-H3C uses HAR RV_hat percentile regime allocation: high-vol routes to L1-H1 trend continuation, low-vol routes to L1-H2 SessionVWAP mean-reversion, middle regime stays neutral."
research_layer: "L1"
hypothesis_family: "regime_switch"
version: "1.0.0"
author: "bulletproof_bt"
created_at: "2026-03-11T00:00:00Z"

required_indicators:
  - ema
  - atr
  - session_vwap

indicator_defaults:
  base_data_frequency_expected: "1m"
  trend_signal_timeframe_default: "15m"
  reversion_signal_timeframe_default: "5m"
  vwap_mode: "session"
  rv1_formula: "(ln(close_t/close_t-1))^2"
  har_features:
    RV_d_days: 1
    RV_w_days: 7
    RV_m_days: 30
  har_forecast: "RV_hat = a + b*RV_d + c*RV_w + d*RV_m"
  regime_percentile_convention: "rolling_past_only_include_current_repo_convention"

parameter_grid:
  fit_window_days: [180, 365]
  q_low: [0.2, 0.3]
  q_high: [0.7, 0.8]
  k: [1.5, 2.0]
  z0: [0.8, 1.0]
  T_hold_trend: [24]
  T_hold_reversion: [12, 24]

gates:
  - field: "rvhat_pct_t"
    op: ">="
    param: "q_high"
  - field: "rvhat_pct_t"
    op: "<="
    param: "q_low"

entry:
  strategy: "l1_h3c_har_regime_switch"
  signal_timeframe: "15m"
  timeframe: "15m"
  base_execution_timeframe: "1m"
  order_timing: "bar_close_submit_next_bar_execution"
  no_pyramiding: true

exit:
  stop_kind: "close_sqrt_rvhat_multiple"
  stop_model: "fixed_close_sqrt_rvhat_multiple"
  stop_param: "k"
  stop_update_policy: "frozen_at_entry"
  time_stop_param_trend: "T_hold_trend"
  time_stop_param_reversion: "T_hold_reversion"
  hold_time_unit: "signal_bars"
  profit_exit_model_reversion: "vwap_touch"
  vwap_mode: "session"
  exit_monitoring_timeframe: "1m"
  take_profit:
    enabled: false

execution_semantics:
  signal_timeframe: "15m"
  base_execution_timeframe: "1m"
  base_data_frequency_expected: "1m"
  strategy_family: "regime_switch"
  baseline_references: ["L1-H1", "L1-H2"]
  gate_model: "har_rv_percentile_switch"
  stop_model: "fixed_close_sqrt_rvhat_multiple"
  stop_update_policy: "frozen_at_entry"
  tp_update_policy: "none"
  hold_time_unit: "signal_bars"
  exit_monitoring_timeframe: "1m"
  atr_source_timeframe: "signal_timeframe"
  coefficient_refit_cadence: "daily_on_completed_signal_day"
  fit_method: "deterministic_ols"
  fit_window_unit: "calendar_days"
  no_pyramiding: true
  branch_allocation_clock: "15m_completed_bars"
  branch_high_vol:
    strategy_family: "trend_continuation"
    signal_timeframe: "15m"
  branch_low_vol:
    strategy_family: "mean_reversion"
    signal_timeframe: "5m"
    vwap_mode: "session"

sizing:
  mode: "constant_r"
  formula: "qty = (equity * r_per_trade) / (k * close_t * sqrt(RV_hat_t))"

risk_controls:
  max_positions: 5
  forbid_adding_to_losers: true
  enforce_free_margin_constraints: true

evaluation:
  required_tiers: ["Tier2", "Tier3"]

logging:
  schema_version: "1.0"
  required_fields:
    - run_id
    - hypothesis_id
    - tier
    - ev_r_gross
    - ev_r_net
    - status
    - RV_hat_t
    - rvhat_pct_t
    - regime_label
    - branch_selected
    - fit_ts_used
    - fit_window_days
    - stop_distance
    - trend_dir_t
    - session_vwap_t
    - z_vwap_t
    - risk_amount
