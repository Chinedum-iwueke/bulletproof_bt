hypothesis_id: "L1-H2B"
title: "Compression + Confirmed Fade"
description: "In volatility-compression regimes, SessionVWAP deviations are tradable only after failed expansion is confirmed."
research_layer: "L1"
hypothesis_family: "mean_reversion"
version: "1.0.0"
author: "bulletproof_bt"
created_at: "2026-03-18T00:00:00Z"

hypothesis_statement: "In volatility-compression regimes, SessionVWAP deviations are tradable only after failed expansion is confirmed. The expected edge comes from trapped continuation participants unwinding after price extends away from VWAP, fails to sustain the move, and re-enters inward toward session fair value."

required_indicators:
  - atr
  - session_vwap

indicator_defaults:
  atr_period: 14
  vwap_mode: "session"
  signal_timeframe_default: "5m"
  compression_window_days: 30
  rv_formula: "atr_14 / close"
  z_vwap_formula: "(close - session_vwap) / atr_14"

parameter_grid:
  q_comp: [0.20, 0.30]
  z_ext: [0.8, 1.0, 1.2]
  z_reentry: [0.2, 0.4]
  k_atr: [1.5, 2.0]
  T_hold: [8, 12]
  require_reversal_close: [false, true]

gates:
  - field: "comp_gate_t"
    op: "=="
    value: true
  - field: "z_reentry"
    op: "<"
    param: "z_ext"

entry:
  strategy: "l1_h2b_confirmed_fade"
  signal_timeframe: "5m"
  timeframe: "5m"
  base_execution_timeframe: "1m"
  order_timing: "bar_close_submit_next_bar_execution"
  no_pyramiding: true

exit:
  stop_kind: "atr_multiple"
  stop_model: "fixed_atr_multiple"
  stop_atr_param: "k_atr"
  stop_update_policy: "frozen_at_entry"
  atr_source_timeframe: "signal_timeframe"
  time_stop_param: "T_hold"
  hold_time_unit: "signal_bars"
  profit_exit_model: "vwap_touch"
  vwap_mode: "session"
  exit_monitoring_timeframe: "1m"

execution_semantics:
  signal_timeframe: "5m"
  base_execution_timeframe: "1m"
  base_data_frequency_expected: "1m"
  vwap_mode: "session"
  stop_model: "fixed_atr_multiple"
  stop_update_policy: "frozen_at_entry"
  tp_update_policy: "none"
  hold_time_unit: "signal_bars"
  exit_monitoring_timeframe: "1m"
  atr_source_timeframe: "signal_timeframe"
  profit_exit_model: "vwap_touch"
  no_pyramiding: true

runtime_controls:
  notes: "Invalid combinations where z_reentry >= z_ext are filtered during materialization."
