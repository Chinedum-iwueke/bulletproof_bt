{% extends "base.html" %}{% block content %}<h1>Approvals</h1><table><tr><th>id</th><th>item</th><th>status</th><th>actions</th></tr>{% for i in items %}<tr><td>{{i.id}}</td><td>{{i.item_id}}</td><td>{{i.status}}</td><td>{% if enable_actions %}<form method="post" action="/approvals/{{i.id}}/approve"><input type="hidden" name="confirm" value="yes"><button>Approve</button></form><form method="post" action="/approvals/{{i.id}}/reject"><input type="hidden" name="confirm" value="yes"><button>Reject</button></form>{% else %}read-only{% endif %}</td></tr>{% endfor %}</table>{% endblock %}
